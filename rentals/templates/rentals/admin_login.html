{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login — Prairie Skies RV Rentals</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { width: 100%; max-width: 400px; }
  </style>
</head>
<body>
  <div class="login-card p-4">
    <div class="text-center mb-4">
      <img src="{% static 'rentals/logo.jpg' %}" alt="Prairie Skies RV Rentals" height="120" class="rounded">
      <h5 class="text-white mt-3">Admin Login</h5>
    </div>
    <div class="card shadow">
      <div class="card-body p-4">
        {% if form.errors %}
        <div class="alert alert-danger small">Invalid username or password.</div>
        {% endif %}
        <form method="post">
          {% csrf_token %}
          <input type="hidden" name="next" value="{{ next }}">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" autofocus required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Log In</button>
        </form>
      </div>
    </div>
    <p class="text-center mt-3"><a href="/" class="text-muted small">← Back to website</a></p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
