<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Prairie Skies RV Rentals{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .sidebar {
      min-height: 100vh;
      background: #1a1a2e;
      color: #fff;
      width: 220px;
      position: fixed;
      top: 0; left: 0;
      padding: 1.5rem 1rem;
    }
    .sidebar a { color: #adb5bd; text-decoration: none; display: block; padding: .5rem .75rem; border-radius: .375rem; margin-bottom: .25rem; }
    .sidebar a:hover, .sidebar a.active { background: #16213e; color: #fff; }
    .sidebar .brand { color: #fff; font-size: 1.1rem; font-weight: 700; margin-bottom: 2rem; padding: .5rem .75rem; }
    .main-content { margin-left: 220px; padding: 2rem; }
    .stat-card { border-left: 4px solid; }
    .flatpickr-day.booked { background: #f8d7da !important; color: #842029 !important; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="brand"><i class="bi bi-truck me-2"></i>Prairie Skies RV Rentals</div>
    <a href="{% url 'admin_dashboard' %}" class="{% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}">
      <i class="bi bi-speedometer2 me-2"></i>Dashboard
    </a>
    <a href="{% url 'admin_booking_list' %}" class="{% if 'booking' in request.resolver_match.url_name %}active{% endif %}">
      <i class="bi bi-calendar-check me-2"></i>Bookings
    </a>
    <a href="{% url 'admin_rv_list' %}" class="{% if 'rv' in request.resolver_match.url_name %}active{% endif %}">
      <i class="bi bi-truck me-2"></i>Manage RVs
    </a>
    <a href="{% url 'admin_customer_list' %}" class="{% if 'customer' in request.resolver_match.url_name %}active{% endif %}">
      <i class="bi bi-people me-2"></i>Customers
    </a>
    <a href="{% url 'admin_quote_list' %}" class="{% if 'quote' in request.resolver_match.url_name %}active{% endif %}">
      <i class="bi bi-file-text me-2"></i>Quotes
    </a>
    <a href="{% url 'admin_invoice_list' %}" class="{% if 'invoice' in request.resolver_match.url_name %}active{% endif %}">
      <i class="bi bi-receipt me-2"></i>Invoices
    </a>
    <hr style="border-color:#333">
    <a href="{% url 'logout' %}">
      <i class="bi bi-box-arrow-left me-2"></i>Log Out
    </a>
  </div>

  <div class="main-content">
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
