{% extends "rentals/base.html" %}

{% block title %}{{ title }} — Prairie Skies RV Rentals{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="mb-0">{{ title }}</h2>
  <a href="{% url 'admin_settings' %}" class="btn btn-outline-secondary">
    <i class="bi bi-arrow-left me-1"></i>Back to Settings
  </a>
</div>

<div class="card" style="max-width: 500px;">
  <div class="card-body">
    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}

      {% if not u %}
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" required autofocus>
      </div>
      {% else %}
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" value="{{ u.username }}" disabled>
      </div>
      {% endif %}

      <div class="row g-3 mb-3">
        <div class="col">
          <label class="form-label">First Name</label>
          <input type="text" name="first_name" class="form-control" value="{{ u.first_name|default:'' }}">
        </div>
        <div class="col">
          <label class="form-label">Last Name</label>
          <input type="text" name="last_name" class="form-control" value="{{ u.last_name|default:'' }}">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" value="{{ u.email|default:'' }}">
      </div>

      <div class="mb-3">
        <label class="form-label">
          {% if u %}New Password <span class="text-muted small">(leave blank to keep current)</span>{% else %}Password{% endif %}
        </label>
        <input type="password" name="{% if u %}new_password{% else %}password1{% endif %}" class="form-control" {% if not u %}required{% endif %}>
      </div>

      {% if not u %}
      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="password2" class="form-control" required>
      </div>
      {% endif %}

      <div class="mb-3">
        <div class="form-check">
          <input type="checkbox" name="is_active" id="is_active" class="form-check-input"
            {% if not u or u.is_active %}checked{% endif %}>
          <label class="form-check-label" for="is_active">Account Active</label>
        </div>
        <div class="form-check mt-1">
          <input type="checkbox" name="is_superuser" id="is_superuser" class="form-check-input"
            {% if u and u.is_superuser %}checked{% endif %}>
          <label class="form-check-label" for="is_superuser">
            Superuser <span class="text-muted small">(full access including user management)</span>
          </label>
        </div>
      </div>

      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-circle me-1"></i>Save
        </button>
        <a href="{% url 'admin_settings' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
