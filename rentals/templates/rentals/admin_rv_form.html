{% extends "rentals/base.html" %}

{% block title %}{{ title }} — Prairie Skies RV Rentals{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="mb-0">{{ title }}</h2>
  <a href="{% url 'admin_rv_list' %}" class="btn btn-outline-secondary">
    <i class="bi bi-arrow-left me-1"></i>Back to RVs
  </a>
</div>

<div class="card" style="max-width: 700px;">
  <div class="card-body">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="mb-3">
        <label class="form-label">RV Name</label>
        <input type="text" name="name" class="form-control" value="{{ rv.name|default:'' }}" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="3">{{ rv.description|default:'' }}</textarea>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-4">
          <label class="form-label">Sleeps (capacity)</label>
          <input type="number" name="capacity" class="form-control" value="{{ rv.capacity|default:'' }}" min="1" required>
        </div>
        <div class="col-4">
          <label class="form-label">Price Per Day ($)</label>
          <input type="number" name="price_per_day" class="form-control" value="{{ rv.price_per_day|default:'' }}" step="0.01" min="0" required>
        </div>
        <div class="col-4">
          <label class="form-label">Damage Deposit ($)</label>
          <input type="number" name="damage_deposit" class="form-control" value="{{ rv.damage_deposit|default:'' }}" step="0.01" min="0" required>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Photo</label>
        {% if rv.image %}
          <div class="mb-2">
            <img src="{{ rv.image.url }}" class="img-thumbnail" style="height:120px; object-fit:cover;" alt="{{ rv.name }}">
            <p class="text-muted small mt-1">Upload a new photo to replace the current one.</p>
          </div>
        {% endif %}
        <input type="file" name="image" class="form-control" accept="image/*">
      </div>

      <div class="mb-4">
        <div class="form-check">
          <input type="checkbox" name="is_active" id="is_active" class="form-check-input"
            {% if rv is None or rv.is_active %}checked{% endif %}>
          <label class="form-check-label" for="is_active">
            Active — visible to customers on the website
          </label>
        </div>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-circle me-1"></i>Save RV
        </button>
        <a href="{% url 'admin_rv_list' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
